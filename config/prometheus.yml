global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'market-data'
    static_configs:
      - targets: ['market-data:8001']

  - job_name: 'prediction'
    static_configs:
      - targets: ['prediction:8002']

  - job_name: 'signal'
    static_configs:
      - targets: ['signal:8000']

  - job_name: 'risk'
    static_configs:
      - targets: ['risk:8000']

  - job_name: 'executor'
    static_configs:
      - targets: ['executor:8005']

  - job_name: 'position'
    static_configs:
      - targets: ['position:8000']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8000']

  - job_name: 'feature-store'
    static_configs:
      - targets: ['feature-store:8007']

  - job_name: 'sentiment-analysis'
    static_configs:
      - targets: ['sentiment-analysis:8008']

  - job_name: 'trend-analysis'
    static_configs:
      - targets: ['trend-analysis:8009']

  - job_name: 'portfolio-optimizer'
    static_configs:
      - targets: ['portfolio-optimizer:8010']

  - job_name: 'backtesting'
    static_configs:
      - targets: ['backtesting:8011']
