services:
  # Infrastructure
  redis:
    image: redis:7-alpine
    container_name: mc-redis
    restart: unless-stopped
    env_file: ./config/trading.env
    # Configure Redis to handle persistence failures gracefully
    # --save "" disables RDB persistence (we use Redis for real-time data, not long-term storage)
    # This prevents I/O errors from affecting Redis operation
    command: redis-server --requirepass ${REDIS_PASSWORD} --save "" --appendonly no
    ports:
      - "6379:6379"
    volumes:
      - ./shared/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: mc-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./shared/timescale-data:/var/lib/postgresql/data
      - ./config/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Trading Services
  market-data:
    build: ./services/market-data
    container_name: mc-market-data
    restart: unless-stopped
    env_file: ./config/trading.env
    ports:
      - "8001:8001"
    volumes:
      - ./config:/config
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

  prediction:
    build: ./services/prediction
    container_name: mc-prediction
    restart: unless-stopped
    env_file: ./config/trading.env
    ports:
      - "8002:8000"
    volumes:
      - ./shared/models:/app/models
      - ./config:/config
    depends_on:
      redis:
        condition: service_healthy
    # Uncomment below to enable GPU support (requires NVIDIA Docker runtime)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  signal:
    build: ./services/signal
    container_name: mc-signal
    restart: unless-stopped
    env_file: ./config/trading.env
    ports:
      - "8003:8000"
    volumes:
      - ./config:/config
    depends_on:
      redis:
        condition: service_healthy

  risk:
    build: ./services/risk
    container_name: mc-risk
    restart: unless-stopped
    env_file: ./config/trading.env
    ports:
      - "8004:8000"
    depends_on:
      redis:
        condition: service_healthy

  executor:
    build: ./services/executor
    container_name: mc-executor
    restart: unless-stopped
    env_file: ./config/trading.env
    ports:
      - "8005:8005"
    depends_on:
      redis:
        condition: service_healthy

  position:
    build: ./services/position
    container_name: mc-position
    restart: unless-stopped
    env_file: ./config/trading.env
    ports:
      - "8006:8000"
    depends_on:
      redis:
        condition: service_healthy

  api-gateway:
    build: ./services/api-gateway
    container_name: mc-api-gateway
    restart: unless-stopped
    env_file: ./config/trading.env
    ports:
      - "8080:8000"
    depends_on:
      - market-data
      - prediction
      - signal
      - risk
      - executor
      - position
      - timescaledb
