services:
  # Infrastructure
  redis:
    image: redis:7-alpine
    container_name: mc-redis
    restart: unless-stopped
    env_file: ./config/trading.env
    # AOF persistence enabled to preserve positions, portfolio state, and trade history across restarts
    command: redis-server --requirepass ${REDIS_PASSWORD} --save "" --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - ./shared/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: mc-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./shared/timescale-data:/var/lib/postgresql/data
      - ./config/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Core Trading Services
  # =============================================

  market-data:
    build: ./services/market-data
    container_name: mc-market-data
    restart: unless-stopped
    env_file: ./config/trading.env
    ports:
      - "8001:8001"
    volumes:
      - ./config:/config
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=timescaledb
      - DB_ENABLED=true
      - WS_ENABLED=true
      - WS_TOP_SYMBOLS=100
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
