# Production overrides - use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: mc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for SSL:
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api-gateway
      - dashboard

  # Grafana for metrics visualization
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: mc-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./shared/prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:10.2.2
    container_name: mc-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-mangococo}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./shared/grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  # Production overrides for existing services
  redis:
    deploy:
      resources:
        limits:
          memory: 512M

  timescaledb:
    deploy:
      resources:
        limits:
          memory: 2G
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c work_mem=16MB
      -c max_connections=100

  api-gateway:
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=timescaledb
    deploy:
      resources:
        limits:
          memory: 512M

  prediction:
    deploy:
      resources:
        limits:
          memory: 2G
    # Uncomment for GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  dashboard:
    ports:
      - "3000:3000"
